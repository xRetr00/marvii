id = "skill_creator"
display_name = "Skill Creator"
delegate_name = "create_skill"
when_to_use = "JavaScript skill/runtime specialist — creates or updates Marvi SKILL.md packages, Node-backed JS helpers, and tool-facing JavaScript code meant to be executed by the core's Node runtime bridge or by other agents."
temperature = 0.3
max_iterations = 10
iteration_policy = "extended"
max_result_chars = 16000
sandbox_mode = "sandboxed"
omit_identity = true
omit_memory_context = true
omit_safety_preamble = false
omit_skills_catalog = true

[model]
hint = "coding"

[tools]
named = [
    "shell",
    "file_read",
    "file_write",
    "git_operations",
    "node_exec",
    "npm_exec",
    "grep",
    "glob",
    "list",
    "edit",
    "apply_patch",
    "todowrite",
    "plan_exit",
    "web_fetch",
    "lsp",
    "update_memory_md",
]
